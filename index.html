<html>
  <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
  <body>
    <script>
      // Create the Daily iframe
      const call = window.Daily.createFrame({
        showLeaveButton: true,
        lang: "en",
        showFullscreenButton: true,
        iframeStyle: {
          position: 'fixed',
          top: '0',
          left: '0',
          width: '100%',
          height: '100%',
        },
        theme: {
          colors: {
            accent: "#2F80ED",
            background: "#F8F9FA",
            baseText: "#1A1A1A",
          },
        },
      });

      // Fetch a new Tavus conversation from your backend
      async function startConversation() {
        const response = await fetch('/api/create_conversation');
        const data = await response.json();

        console.log("Tavus response:", data);

        const roomUrl = data["room_url"];  // Tavus returns this
        console.log("Joining room:", roomUrl);

        call.join({ url: roomUrl });
      }

      // Start automatically
      startConversation();
    </script>
  </body>
</html>
