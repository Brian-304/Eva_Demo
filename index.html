<script>
  const startBtn = document.getElementById("startDemoBtn");

  startBtn.onclick = async () => {
    try {
      // 1. Call your Python backend to create a new conversation
      const response = await fetch("/api/create_conversation");
      const data = await response.json();

      const roomUrl = data.conversation_url;

      if (!roomUrl) {
        alert("Error: No conversation URL returned.");
        return;
      }

      console.log("Joining room:", roomUrl);

      // 2. Join the Daily room dynamically
      call.join({ url: roomUrl });

      // 3. Start your 2-minute timeout AFTER joining
      setTimeout(() => {
        call.leave();
        alert("Your demo session has ended.");
      }, 2 * 60 * 1000);

    } catch (err) {
      console.error("Error starting demo:", err);
      alert("Failed to start demo.");
    }
  };
</script>
