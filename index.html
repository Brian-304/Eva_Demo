<!DOCTYPE html>
<html>
  <head>
    <title>Tavus AI Conversation</title>
    <script crossorigin src="https://unpkg.com/@daily-co/daily-js"></script>
  </head>
  <body>
    <script>
      const call = window.Daily.createFrame({
        showLeaveButton: true,
        iframeStyle: {
          position: 'fixed', top: '0', left: '0', width: '100%', height: '100%',
        },
      });

      async function startConversation() {
        try {
          const response = await fetch('/api/create_conversation');
          const data = await response.json();
          
          // Tavus returns the Daily room URL in the 'conversation_url' or 'room_url' field
          const roomUrl = data.conversation_url || data.room_url; 
          
          if (roomUrl) {
            call.join({ url: roomUrl });
          } else {
            console.error("No room URL found in response:", data);
          }
        } catch (e) {
          console.error("Failed to start conversation:", e);
        }
      }

      startConversation();
    </script>
  </body>
</html>
