<!DOCTYPE html>
<html>
<head>
  <title>Eva Demo</title>

  <!-- Load Daily JS -->
  <script src="https://unpkg.com/@daily-co/daily-js"></script>
</head>

<body>

  <!-- Start Demo button -->
  <button id="startDemoBtn">Start Demo</button>

  <!-- Daily video container -->
  <div id="video-container"></div>

  <!-- Script must be at the bottom -->
  <script>
    // 1. Create the Daily call frame
    const call = window.DailyIframe.createFrame(
      document.getElementById("video-container"),
      {
        showLeaveButton: true,
        iframeStyle: {
          width: "100%",
          height: "600px",
          border: "1px solid #ccc",
          borderRadius: "8px"
        }
      }
    );

    // 2. Wire up the Start Demo button
    const startBtn = document.getElementById("startDemoBtn");

    startBtn.onclick = async () => {
      try {
        // Call your Python backend to create a new conversation
        const response = await fetch("/api/create_conversation");
        const data = await response.json();

        const roomUrl = data.conversation_url;

        if (!roomUrl) {
          alert("Error: No conversation URL returned.");
          return;
        }

        console.log("Joining room:", roomUrl);

        // Join the Daily room dynamically
        call.join({ url: roomUrl });

        // Start your 2-minute timeout AFTER joining
        setTimeout(() => {
          call.leave();
          alert("Your demo session has ended.");
        }, 2 * 60 * 1000);

      } catch (err) {
        console.error("Error starting demo:", err);
        alert("Failed to start demo.");
      }
    };
  </script>

</body>
</html>
